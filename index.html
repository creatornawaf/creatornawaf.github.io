<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        video {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            display: block;
        }
    </style>
</head>
<body>
    <video autoplay muted loop controls playsinline>
        <source src="https://raw.githubusercontent.com/creatornawaf/creatornawaf.github.io/main/dance.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
</body>
</html>
